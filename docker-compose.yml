services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432":"5432"
    volumes:
      -postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

    populate:
      build:
        context: .
        dockerfile: Dockerfile.populate
      env_file: .env
      environment:
        POSTGRES_HOST: db
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      depends_on:
        db:
          condition: service_healthy
      volumes:
        - ./bd:/app/bd
        - ./volumen:/app/volumen
      restart: on-failure
   
  volumes:
    postgres_data:
